<!doctype html>
<html>
  <head>
    <title>Delete Contact</title>
  </head>
  <body>
    <h2>🗑 Confirm Delete</h2>

    <p>Are you sure you want to delete <strong>{{ contact.name }}</strong>?</p>

    <form method="POST">
      {% csrf_token %}
      <button type="submit">Yes, Delete</button>
    </form>

    <br />
    <a href="{% url 'contacts_list' %}">Cancel</a>
  </body>
</html>
